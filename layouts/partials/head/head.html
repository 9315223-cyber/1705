<meta name="viewport" content="width=device-width, initial-scale=1.0" />

{{ with .Description | default .Summary }}
<meta name="description" content="{{ . }}">
{{ end }}
<link rel="canonical" href="{{ .Permalink }}" />

{{ if .IsTranslated }}
  {{ range .Translations }}
  <link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}" />
  {{ end }}
  <link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}" />
{{ end }}

<meta property="og:title" content="{{ .Title }}" />
<meta property="og:description" content="{{ with .Description | default .Summary }}{{ . }}{{ end }}" />
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:image" content="{{ with .Params.image }}{{ . | absURL }}{{ else }}{{ "logo.png" | absURL }}{{ end }}" />

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  {{ if .IsPage }}
  "@type": "TechArticle",
  "headline": "{{ .Title }}",
  "image": "{{ with .Params.image }}{{ . | absURL }}{{ else }}{{ "logo.png" | absURL }}{{ end }}",
  "datePublished": "{{ if not .Date.IsZero }}{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}{{ end }}",
  "dateModified": "{{ if not .Lastmod.IsZero }}{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}{{ end }}",
  {{ else }}
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  {{ end }}
  "author": {
    "@type": "Organization",
    "name": "Congo Enterprise Hub"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Congo Enterprise Hub",
    "logo": { 
      "@type": "ImageObject", 
      "url": "{{ "logo.png" | absURL }}" 
    }
  },
  "description": "{{ with .Description | default .Summary }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}"
}
</script>
