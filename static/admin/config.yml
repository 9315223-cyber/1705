# =====================================================================
# 1. ОСНОВНІ НАЛАШТУВАННЯ СЕРВЕРА ТА БАЗИ ДАНИХ
# =====================================================================
backend:
  name: github
  repo: 9315223-cyber/1705
  branch: main

# УВІМКНЕНО ПРОФЕСІЙНИЙ РЕЖИМ ПУБЛІКАЦІЇ (ЧЕРНЕТКИ)
publish_mode: editorial_workflow

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

site_url: "https://cyber-hub-1705.pages.dev"
display_url: "https://cyber-hub-1705.pages.dev"

# =====================================================================
# 2. МОВНА МАТРИЦЯ (9 мов)
# =====================================================================
i18n:
  structure: multiple_folders
  locales: [en, uk, de, fr, es, ru, zh, tr, ga]
  default_locale: en

collections:
  # =====================================================================
  # 3. СТАТИЧНІ СТОРІНКИ
  # =====================================================================
  - name: "pages"
    label: "Головні сторінки"
    i18n: true
    files:
      - name: "homepage"
        label: "Головна сторінка"
        file: "content/{{locale}}/_index.md"
        i18n: true
        fields:
          - { label: "Заголовок", name: "title", widget: "string", i18n: true }
          - { label: "Мета-опис", name: "description", widget: "string", i18n: true }
          - { label: "Ключ", name: "translationKey", widget: "string", i18n: "duplicate", default: "home-page" }
          - { label: "Текст", name: "body", widget: "markdown", i18n: true }

      - name: "contact"
        label: "Сторінка Контакти"
        file: "content/{{locale}}/contact.md"
        i18n: true
        fields:
          - { label: "Заголовок", name: "title", widget: "string", i18n: true }
          - { label: "Ключ", name: "translationKey", widget: "string", i18n: "duplicate", default: "contact-page" }
          - { label: "Текст", name: "body", widget: "markdown", i18n: true }
  # =====================================================================
  # 4. ДИНАМІЧНИЙ КОНТЕНТ: БЛОГ ТА ПОСТИ
  # =====================================================================
  - name: "posts"
    label: "Блог / Пости"
    folder: "content/{{locale}}/posts"
    i18n: true
    create: true
    slug: "{{slug}}"
    summary: "{{title}} ({{date}})"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Заголовок статті", name: "title", widget: "string", i18n: true }
      - { label: "Дата публікації", name: "date", widget: "datetime" }
      - { label: "Автор (E-E-A-T)", name: "author", widget: "string", default: "Enterprise Hub Expert" }
      - { label: "Обкладинка (Зображення)", name: "image", widget: "image", required: false, i18n: "duplicate" }
      - { label: "Теги", name: "tags", widget: "list", required: false, i18n: true }
      - { label: "Короткий опис (Meta Description)", name: "description", widget: "string", i18n: true }
      - { label: "Суть для ШІ (Summary)", name: "summary_ai", widget: "string", required: false, i18n: true }
      - { label: "Ключові слова", name: "keywords_ai", widget: "string", required: false, i18n: true }
      - { label: "Ключ зв'язку мов (translationKey)", name: "translationKey", widget: "string", i18n: "duplicate" }
      - { label: "Текст статті", name: "body", widget: "markdown", i18n: true }

  # =====================================================================
  # 5. ДИНАМІЧНИЙ КОНТЕНТ: НАШІ РОБОТИ (ПОРТФОЛІО)
  # =====================================================================
  - name: "works"
    label: "Наші роботи"
    folder: "content/{{locale}}/works"
    i18n: true
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Назва проєкту", name: "title", widget: "string", i18n: true }
      - { label: "Дата реалізації", name: "date", widget: "datetime" }
      - { label: "Обкладинка проєкту", name: "image", widget: "image", required: false, i18n: "duplicate" }
      - { label: "Посилання на проєкт", name: "link", widget: "string", required: false }
      - { label: "Короткий опис кейсу", name: "description", widget: "text", i18n: true }
      - { label: "Ключ зв'язку мов (translationKey)", name: "translationKey", widget: "string", i18n: "duplicate" }
      - { label: "Детальний опис", name: "body", widget: "markdown", i18n: true }

  # =====================================================================
  # 6. СИСТЕМНІ ФАЙЛИ ТА ПРАВИЛА РОБОТІВ
  # =====================================================================
  - name: "system_configs"
    label: "Системні файли (SEO / ШІ)"
    delete: false
    files:
      - title: "Політика для ШІ (ai.txt)"
        name: "ai_txt"
        file: "static/ai.txt"
        format: "raw"
        fields:
          - { label: "Вміст ai.txt", name: "body", widget: "text" }

      - title: "Безпека Cloudflare (_headers)"
        name: "headers"
        file: "static/_headers"
        format: "raw"
        fields:
          - { label: "Вміст _headers", name: "body", widget: "text" }

      - title: "Правила для роботів (robots.txt)"
        name: "robots_txt"
        file: "static/robots.txt"
        format: "raw"
        fields:
          - { label: "Вміст robots.txt", name: "body", widget: "text" }
          