# =====================================================================
# 1. ОСНОВНІ НАЛАШТУВАННЯ СЕРВЕРА ТА БАЗИ ДАНИХ
# =====================================================================
backend:
  name: github
  repo: 9315223-cyber/1705
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

site_url: "https://cyber-hub-1705.pages.dev"
display_url: ""

# =====================================================================
# 2. МОВНА МАТРИЦЯ (9 мов)
# =====================================================================
i18n:
  structure: multiple_folders
  locales: [en, uk, de, fr, es, ru, zh, tr, ga]
  default_locale: en

collections:
  # =====================================================================
  # 3. СТАТИЧНІ СТОРІНКИ (Одиночні файли: Головна та Контакти)
  # =====================================================================
  - name: "pages"
    label: "Головні сторінки"
    i18n: true
    files:
      - title: "Головна сторінка"
        name: "homepage"
        file: "content/en/_index.md" 
        fields:
          - { label: "Заголовок головної сторінки", name: "title", widget: "string" }
          - { label: "Мета-опис для SEO", name: "description", widget: "string" }
          - { label: "Ключ зв'язку мов (translationKey)", name: "translationKey", widget: "string", default: "home" }
          - { label: "Текст на головній сторінці", name: "body", widget: "markdown" }

      - title: "Сторінка Контакти"
        name: "contact"
        file: "content/en/contact.md"
        fields:
          - { label: "Заголовок сторінки", name: "title", widget: "string" }
          - { label: "Ключ зв'язку мов (translationKey)", name: "translationKey", widget: "string", default: "contact" }
          - { label: "Текст над формою", name: "body", widget: "markdown" }

  # =====================================================================
  # 4. ДИНАМІЧНИЙ КОНТЕНТ: БЛОГ ТА ПОСТИ
  # =====================================================================
  - name: "posts"
    label: "Блог / Пости"
    folder: "content/{{locale}}/posts"
    i18n: true
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Заголовок статті", name: "title", widget: "string" }
      - { label: "Дата публікації", name: "date", widget: "datetime" }
      - { label: "Автор (E-E-A-T)", name: "author", widget: "string", default: "Enterprise Hub Expert" }
      - { label: "Короткий опис (Meta Description)", name: "description", widget: "string" }
      - { label: "Суть для ШІ (Summary)", name: "summary_ai", widget: "string", required: false }
      - { label: "Ключові слова", name: "keywords_ai", widget: "string", required: false }
      - { label: "Ключ зв'язку мов (translationKey)", name: "translationKey", widget: "string" }
      - { label: "Текст статті", name: "body", widget: "markdown" }

  # =====================================================================
  # 5. ДИНАМІЧНИЙ КОНТЕНТ: НАШІ РОБОТИ (ПОРТФОЛІО)
  # =====================================================================
  - name: "works"
    label: "Наші роботи"
    folder: "content/{{locale}}/works"
    i18n: true
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Назва проєкту", name: "title", widget: "string" }
      - { label: "Дата реалізації", name: "date", widget: "datetime" }
      - { label: "Посилання на проєкт", name: "link", widget: "string", required: false }
      - { label: "Короткий опис кейсу", name: "description", widget: "text" }
      - { label: "Ключ зв'язку мов (translationKey)", name: "translationKey", widget: "string" }
      - { label: "Детальний опис", name: "body", widget: "markdown" }

  # =====================================================================
  # 6. СИСТЕМНІ ФАЙЛИ ТА ПРАВИЛА РОБОТІВ
  # =====================================================================
  - name: "system_configs"
    label: "Системні файли (SEO / ШІ)"
    delete: false
    files:
      - title: "Політика для ШІ (ai.txt)"
        name: "ai_txt"
        file: "static/ai.txt"
        format: "raw"
        fields:
          - { label: "Вміст ai.txt", name: "body", widget: "text" }

      - title: "Безпека Cloudflare (_headers)"
        name: "headers"
        file: "static/_headers"
        format: "raw"
        fields:
          - { label: "Вміст _headers", name: "body", widget: "text" }

      - title: "Правила для роботів (robots.txt)"
        name: "robots_txt"
        file: "static/robots.txt"
        format: "raw"
        fields:
          - { label: "Вміст robots.txt", name: "body", widget: "text" }
          