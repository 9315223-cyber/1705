backend:
  name: github
  repo: 9315223-cyber/1705
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

site_url: "https://cyber-hub-1705.pages.dev"
display_url: ""

# Глобальне налаштування мультиязичності для Sveltia CMS
i18n:
  structure: multiple_folders
  locales: [en, uk, de, fr, es, ru, zh, tr, ga]
  default_locale: en

collections:
  # =====================================================================
  # 🏠 ГОЛОВНА СТОРІНКА (Редагування контенту для кожної з 9 мов)
  # =====================================================================
  - name: "homepage"
    label: "Головна сторінка"
    folder: "content"
    depth: 1
    filter: { field: "layout", value: "homepage" }
    i18n: true
    create: false
    fields:
      - { label: "Заголовок головної сторінки", name: "title", widget: "string" }
      - { label: "Мета-опис (SEO)", name: "description", widget: "string" }
      - { label: "Layout Тип (Не змінювати)", name: "layout", widget: "hidden", default: "homepage" }
      - { label: "Type Тип (Не змінювати)", name: "type", widget: "hidden", default: "page" }
      - { label: "Головний текст послуг з автоматизації", name: "body", widget: "markdown" }

  # =====================================================================
  # 📝 КОЛЕКЦІЯ 1: БЛОГ / ПОСТИ / НАУКОВІ МАТЕРІАЛИ (9 мов)
  # =====================================================================
  - name: "posts"
    label: "Блог / Пости"
    folder: "content/{{locale}}/posts"
    i18n: true
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Заголовок статті (H1)", name: "title", widget: "string" }
      - { label: "Дата публікації", name: "date", widget: "datetime" }
      - { label: "Ім'я Автора (Вимога Google E-E-A-T)", name: "author", widget: "string", default: "Enterprise Hub Expert" }
      - { label: "Короткий опис для класичного SEO (Meta Description)", name: "description", widget: "string" }
      - { label: "Стислий концентрат факту для ШІ та SLM-панелей", name: "summary_ai", widget: "string" }
      - { label: "Ключові слова для ШІ-асоціацій (через кому)", name: "keywords_ai", widget: "string" }
      - { label: "Унікальний ключ зв'язку мов (translationKey)", name: "translationKey", widget: "string" }
      - { label: "Текст статті (Markdown)", name: "body", widget: "markdown" }

  # =====================================================================
  # 💼 КОЛЕКЦІЯ 2: НАШІ РОБОТИ (Works кейси для портфоліо)
  # =====================================================================
  - name: "works"
    label: "Наші роботи"
    folder: "content/{{locale}}/works"
    i18n: true
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Назва проєкту / Кейсу", name: "title", widget: "string" }
      - { label: "Дата реалізації", name: "date", widget: "datetime" }
      - { label: "Пряме посилання на сайт проєкту", name: "link", widget: "string" }
      - { label: "Короткий опис кейсу (SEO Title/Meta)", name: "description", widget: "text" }
      - { label: "Унікальний ключ зв'язку мов (translationKey)", name: "translationKey", widget: "string" }
      - { label: "Детальний опис виконаних робіт (Markdown)", name: "body", widget: "markdown" }

  # =====================================================================
  # 📞 КОЛЕКЦІЯ 3: СТОРІНКА КОНТАКТІВ
  # =====================================================================
  - name: "contact"
    label: "Сторінка Контакти"
    folder: "content"
    depth: 2
    filter: { field: "layout", value: "contact" }
    i18n: true
    create: false
    fields:
      - { label: "Заголовок сторінки", name: "title", widget: "string" }
      - { label: "Layout (Не змінювати)", name: "layout", widget: "hidden", default: "contact" }
      - { label: "Контактна інформація та текст над формою", name: "body", widget: "markdown" }
      