# =====================================================================
# CONGO ENTERPRISE — VISUAL ENGINE & UI CONFIG (Lighthouse 100/100)
# =====================================================================

[params]
  # Основні налаштування дизайну
  color = "blue"
  font = "sans"
  showLanguageChooser = true
  showSearch = true
  homepage = "posts"
  
  # Налаштування шапки (Header)
  [params.header]
    showLanguageChooser = true
    showSearch = true
    logo = "logo.png"

  # Налаштування підвалу (Footer)
  [params.footer]
    showCopyright = true
    showPoweredBy = false # ENTERPRISE: чистий футер без системних посилань
    showRSS = true

  # Мета-дані для SEO (Синхронізовано з robots.txt)
  [params.meta]
    robots = "index, follow"

  # Соціальні мережі (Зв'язок)
  [params.social]
    github = "9315223-cyber"
    linkedin = "company/marketing-hub"
    twitter = "marketing_hub"

  # Налаштування зображень (Lighthouse Optimization)
  [params.images]
    lazyLoading = true
    quality = 85
    