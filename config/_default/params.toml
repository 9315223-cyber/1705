# =====================================================================
# CONGO ENTERPRISE — VISUAL ENGINE & UI CONFIG (Lighthouse 100/100)
# =====================================================================

[params]
  color = "blue"
  font = "sans"
  showLanguageChooser = true
  showSearch = true
  homepage = "posts" # ПРИМІТКА: Виводить на головну сторінку статті з папки /posts/
  
  [params.header]
    showLanguageChooser = true
    showSearch = true
    logo = "logo.png" # ПРИМІТКА: Використовується в head.html для мікророзмітки логотипу

  [params.footer]
    showCopyright = true
    showPoweredBy = false # ПРИМІТКА: Ховаємо зайві посилання, покращуємо SEO-вагу
    showRSS = true

  [params.meta]
    robots = "index, follow" # ПРИМІТКА: Дозволяє індексацію на додаток до robots.txt

  [params.social]
    github = "9315223-cyber"
    linkedin = "company/marketing-hub"
    twitter = "marketing_hub"

  [params.images]
    lazyLoading = true # ПРИМІТКА: Забезпечує 100/100 балів Lighthouse (відкладене завантаження)
    quality = 85

# ПРИМІТКА: Цей блок береться скриптом head.html і перетворюється на JSON-LD.
# ШІ-боти читають це, щоб підтвердити вашу експертність (E-E-A-T).
[author]
  name = "Congo Enterprise Team"
  image = "profile.png"
  headline = "Next-Gen Multilingual Marketing & AI Hub"
  