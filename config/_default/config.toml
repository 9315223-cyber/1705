baseURL = "https://cyber-hub-1705.pages.dev/"
title = "Congo Enterprise Hub"
timeout = "60s"

# СИНХРОНІЗАЦІЯ ДЕФОЛТІВ (Україна — головне серце хабу)
locale = "uk-ua"
defaultContentLanguage = "uk"
defaultContentLanguageInSubdir = true

# КРИТИЧНО ДЛЯ LIGHTHOUSE 100/100 ТА СТАБІЛЬНОСТІ CODESPACES
relativeURLs = false
canonifyURLs = false

[module]
  [[module.imports]]
    path = "github.com/jpanther/congo/v2"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"
[params]
  # Вмикаємо пошук (лупа у верхній панелі)
  showSearch = true
  
  # Вмикаємо перемикач мов (глобус у верхній панелі)
  showLanguageSwitcher = true
  
  # Опціонально: додаємо ще зручні налаштування для Congo
  showMenu = true
  showThemeToggle = true
  [menus]
  [[menus.main]]
    name = "Головна"
    pageRef = "/"
    weight = 10
  [[menus.main]]
    name = "Блог"
    pageRef = "/posts"
    weight = 20
  [[menus.main]]
    name = "Наші роботи"
    pageRef = "/works"
    weight = 30
  [[menus.main]]
    name = "Контакти"
    pageRef = "/contact"
    weight = 40